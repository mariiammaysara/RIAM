<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Radial Neon Glow -->
    <radialGradient id="neon-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0" />
    </radialGradient>

    <!-- Main Gradient (Indigo to Violet/Purple) -->
    <linearGradient id="riam-primary-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>

    <!-- Secondary Accent Gradient -->
    <linearGradient id="riam-accent-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>

    <!-- Drop Shadows for Premium Floating Depth -->
    <filter id="shadow-premium" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#6366f1" flood-opacity="0.25" />
    </filter>
    <filter id="shadow-accent" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Ambient Glow Background -->
  <circle cx="250" cy="250" r="220" fill="url(#neon-glow)" />

  <g filter="url(#shadow-premium)">
    <!-- 1. The Speech Bubble Base Segment -->
    <path 
      d="M 160 360 
         C 120 360, 100 340, 100 300 
         L 100 160 
         C 100 120, 120 100, 160 100 
         L 300 100 
         C 340 100, 360 120, 360 160 
         L 360 300 
         C 360 340, 340 360, 300 360 
         L 230 360 
         L 170 410 
         C 160 418, 160 410, 160 400 
         Z" 
      fill="none" 
      stroke="url(#riam-primary-gradient)" 
      stroke-width="20" 
      stroke-linejoin="round" 
      stroke-linecap="round"
    />

    <!-- 2. Abstract Geometric 'R' Loop & Handoff Arc inside Bubble -->
    <path 
      d="M 170 170 
         L 245 170 
         C 285 170, 285 240, 245 240 
         L 170 240 
         L 170 310" 
      fill="none" 
      stroke="url(#riam-primary-gradient)" 
      stroke-width="24" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />

    <!-- 3. R's Diagonal Leg transforming into a Support Handoff Wave -->
    <path 
      d="M 225 240 
         L 285 310 
         C 295 320, 310 320, 320 310 
         C 330 300, 330 285, 320 275" 
      fill="none" 
      stroke="url(#riam-primary-gradient)" 
      stroke-width="20" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
  </g>

  <!-- 4. Floating AI Core Node (Glowing Blue Orb representing Orchestration) -->
  <circle 
    cx="360" 
    cy="140" 
    r="16" 
    fill="url(#riam-accent-gradient)" 
    filter="url(#shadow-accent)" 
  />
  <circle 
    cx="360" 
    cy="140" 
    r="6" 
    fill="#ffffff" 
  />

  <!-- 5. Supporting Data Links (Dotted connection lines) -->
  <line 
    x1="320" y1="140" 
    x2="360" y2="140" 
    stroke="#60a5fa" 
    stroke-width="4" 
    stroke-dasharray="2 6" 
    stroke-linecap="round" 
  />
  <line 
    x1="360" y1="180" 
    x2="360" y2="140" 
    stroke="#60a5fa" 
    stroke-width="4" 
    stroke-dasharray="2 6" 
    stroke-linecap="round" 
  />
</svg>
